name: Production Deployment to VPS

env:
  CHATGPT_APP_URL: ${{ vars.CHATGPT_APP_URL || 'https://chatgpt.passport.et' }}

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Deploy Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck application
        run: pnpm typecheck

      - name: Build ChatGPT app
        run: pnpm chatgpt:build

      - name: Validate Docker Compose config
        run: docker compose --env-file .env.example config

  deploy:
    name: Deploy Frontend and ChatGPT App to Server
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            cd /opt/passport/passport-frontend

            wait_for_healthy() {
              service="$1"
              timeout="${2:-90}"
              elapsed=0

              while [ "$elapsed" -lt "$timeout" ]; do
                healthy_count="$(docker ps \
                  --filter "label=com.docker.compose.service=${service}" \
                  --filter "health=healthy" \
                  --format '{{.ID}}' | wc -l | tr -d ' ')"

                if [ "${healthy_count}" -ge 1 ]; then
                  echo "✅ ${service} has a healthy container."
                  return 0
                fi

                sleep 5
                elapsed=$((elapsed + 5))
              done

              echo "❌ ${service} did not become healthy within ${timeout}s."
              docker compose ps "${service}"
              docker compose logs --tail 100 "${service}"
              return 1
            }

            rollout_service() {
              service="$1"

              echo "🔨 Building ${service} image..."
              docker compose build --no-cache "${service}"

              echo "⚡ Starting new ${service} instance alongside old one..."
              docker compose up -d --scale "${service}=2" --no-recreate "${service}"

              echo "⏳ Waiting for ${service} to become healthy..."
              wait_for_healthy "${service}"

              echo "♻️  Removing old ${service} container, keeping new one..."
              docker compose up -d --scale "${service}=1" --remove-orphans "${service}"
              wait_for_healthy "${service}"
            }

            # Step 1: Pull the latest code
            echo "📥 Pulling latest code..."
            git fetch --all --prune
            git reset --hard origin/${{ github.ref_name }}

            # Step 2: Pull latest images for supporting services (no rebuild needed)
            echo "📦 Pulling latest images for supporting services..."
            docker compose pull umami nginx-proxy-manager

            # Step 3: Roll app services with the same zero-downtime flow
            rollout_service passport-frontend
            rollout_service passport-chatgpt-app

            # Step 4: Ensure all services are up (NPM, Umami, app services)
            echo "🔄 Ensuring all services are running..."
            docker compose up -d

            # Step 5: Clean up unused images and containers
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            # Step 6: Show final status
            echo "✅ Deployment complete!"
            echo ""
            echo "📊 Service Status:"
            docker compose ps
            echo ""
            echo "💾 Disk Usage:"
            docker system df

      - name: Smoke test public ChatGPT app
        run: |
          set -e

          echo "Checking health endpoint..."
          curl -fsS --max-time 20 "${CHATGPT_APP_URL}/healthz"

          echo ""
          echo "Running MCP initialize..."
          curl -fsS --max-time 20 \
            -X POST "${CHATGPT_APP_URL}/mcp" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"github-actions-smoke-test","version":"1.0.0"}}}' \
            | tee /tmp/chatgpt-app-initialize.json

          grep -q '"protocolVersion":"2025-03-26"' /tmp/chatgpt-app-initialize.json

          echo ""
          echo "Running MCP tools/list..."
          curl -fsS --max-time 20 \
            -X POST "${CHATGPT_APP_URL}/mcp" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | tee /tmp/chatgpt-app-tools.json

          grep -q '"search_passports"' /tmp/chatgpt-app-tools.json
          grep -q '"get_passport_details"' /tmp/chatgpt-app-tools.json
          grep -q '"render_passport_results"' /tmp/chatgpt-app-tools.json

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "🌐 Frontend: https://passport.et"
            echo "🤖 ChatGPT MCP: ${CHATGPT_APP_URL}/mcp"
            echo "📊 Analytics: https://analytics.passport.et"
          else
            echo "❌ Deployment failed!"
            exit 1
          fi
