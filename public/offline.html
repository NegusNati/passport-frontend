<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passport.ET Offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6fbf9;
        --surface: rgba(255, 255, 255, 0.92);
        --border: rgba(0, 153, 102, 0.16);
        --text: #12312a;
        --muted: #4f6d67;
        --accent: #009966;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(0, 153, 102, 0.12), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(0, 153, 102, 0.1), transparent 24rem),
          var(--bg);
        color: var(--text);
        font-family:
          Figtree,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      main {
        width: min(100%, 28rem);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--surface);
        padding: 28px;
        box-shadow: 0 32px 64px -40px rgba(18, 49, 42, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 6vw, 2.2rem);
        line-height: 1.02;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      button,
      a {
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
      }

      button {
        background: var(--accent);
        color: #fff;
      }

      a {
        border-color: var(--border);
        color: var(--text);
        background: transparent;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline.</h1>
      <p>
        Passport.ET saved parts of the site for weak connections, but this page needs the internet
        right now. Reconnect and try again.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Try again</button>
        <a href="/">Go home</a>
      </div>
    </main>
  </body>
</html>
